# ============================================================
#  AD5941 potentiostat 브링업 (RTT 로그 + BLE NUS 스트리밍)
# ============================================================

# ---- Bluetooth (BLE NUS) : emg_ble 구조 재활용 ----
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="ad5941"
CONFIG_BT_NUS=y

# MTU / throughput (전류값 한 줄이 기본 MTU 20B 를 넘을 수 있어 크게)
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
# 폰이 MTU 를 안 올려도 우리가 먼저 교환하려면 GATT client 절차 필요.
CONFIG_BT_GATT_CLIENT=y

# 32MHz HFXO 시동 대기시간 여유 (emg_ble 이력: 느린 크리스탈 재시동 실패 우회).
# 이 보드에서 단독 구동 시 광고가 불안정하면 main.c 의 HFXO_ALWAYS_ON=1 도 고려.
CONFIG_MPSL_HFCLK_LATENCY=5000

# ---- Peripherals ----
CONFIG_SPI=y
CONFIG_GPIO=y

# ---- 부동소수점 ----
# nRF52832 = Cortex-M4F (하드웨어 FPU 있음).
# AD5940_ADCCode2Volt() 등 라이브러리가 float 를 쓰므로 FPU 켬.
CONFIG_FPU=y
# 로그에서 전류값을 %f 로 찍기 위해 printf float 지원 필요.
CONFIG_CBPRINTF_FP_SUPPORT=y

# ---- LFCLK 소스 ----
# 새 커스텀 보드라 32.768kHz 크리스탈 실장 여부가 불확실 -> 내부 RC 로 시작(무조건 기동).
# RC 도 BLE 에 쓸 수 있으나(NCS 가 자동 보정), 연결/광고가 불안정하면 크리스탈 실장 후
# 아래 한 줄을 지워 기본값(XTAL)로 전환할 것.
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# ---- Logging: SEGGER RTT, non-blocking(overwrite) ----
# overwrite 모드 = RTT Viewer 가 안 붙어 있어도 절대 블록되지 않음.
CONFIG_LOG=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_RTT_MODE_OVERWRITE=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=2048
CONFIG_LOG_MODE_DEFERRED=y

# ---- Stacks ----
# ad5940 라이브러리 + float 연산 여유 있게.
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=2048
